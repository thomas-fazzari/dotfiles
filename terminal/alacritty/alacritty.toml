[env]
TERM = "xterm-256color"

[general]
live_config_reload = true

[window]
dimensions = { columns = 110, lines = 25 }
decorations = "Transparent"
dynamic_title = true
dynamic_padding = true
padding = { x = 12, y = 35 }
opacity = 1.0
blur = true

[font]
size = 16.0

[font.normal]
family = "0xProto Nerd Font"

[font.offset]
y = 2

[colors.primary]
background = "#1F212A"
foreground = "#a6accd"

[colors.cursor]
cursor = "#a6accd"
text = "#1F212A"

[colors.selection]
background = "#303340"
text = "#a6accd"

[colors.normal]
black = "#1b1e28"
red = "#d0679d"
green = "#5DE4c7"
yellow = "#fffac2"
blue = "#89ddff"
magenta = "#f087bd"
cyan = "#89ddff"
white = "#a6accd"

[colors.bright]
black = "#a6accd"
red = "#d0679d"
green = "#5DE4c7"
yellow = "#fffac2"
blue = "#ADD7FF"
magenta = "#f087bd"
cyan = "#ADD7FF"
white = "#ffffff"

[cursor]
style = { shape = "Block", blinking = "On" }

[[hints.enabled]]
command = "open"
hyperlinks = true
post_processing = true
persist = false
mouse = { enabled = true }
binding = { key = "U", mods = "Control|Shift" }

[keyboard]
bindings = [
  { key = "C", mods = "Command", action = "Copy" },
  { key = "V", mods = "Command", action = "Paste" },
  { key = "N", mods = "Command", action = "CreateNewWindow" },
  { key = "Q", mods = "Command", action = "Quit" },
]
