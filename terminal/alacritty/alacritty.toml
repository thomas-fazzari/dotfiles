[env]
TERM = "xterm-256color"

[general]
live_config_reload = true

[window]
dimensions = { columns = 110, lines = 25 }
decorations = "Transparent"
dynamic_title = true
dynamic_padding = true
padding = { x = 12, y = 35 }
opacity = 1.0
blur = true

[font]
size = 16.0

[font.normal]
family = "0xProto Nerd Font"

[font.offset]
y = 2

[colors.primary]
background = "#1a1c2e"
foreground = "#c0caf5"

[colors.cursor]
cursor = "#c0caf5"
text = "#1a1b26"

[colors.selection]
background = "#364a82"
text = "#c0caf5"

[colors.normal]
black = "#15161e"
red = "#ff7a98"
green = "#a7e368"
yellow = "#ffb0ee"
blue = "#86abff"
magenta = "#c8a1ff"
cyan = "#8ce0ff"
white = "#a9b1d6"

[colors.bright]
black = "#414868"
red = "#ff7a98"
green = "#a7e368"
yellow = "#ffb0ee"
blue = "#86abff"
magenta = "#c8a1ff"
cyan = "#8ce0ff"
white = "#c0caf5"

[cursor]
style = { shape = "Block", blinking = "On" }

[[hints.enabled]]
command = "open"
hyperlinks = true
post_processing = true
persist = false
mouse = { enabled = true }
binding = { key = "U", mods = "Control|Shift" }

[keyboard]
bindings = [
  { key = "C", mods = "Command", action = "Copy" },
  { key = "V", mods = "Command", action = "Paste" },
  { key = "N", mods = "Command", action = "CreateNewWindow" },
  { key = "Q", mods = "Command", action = "Quit" },
]
